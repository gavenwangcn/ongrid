name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    env:
      FRONTIER_VERSION: v1.2.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release paths
        shell: bash
        run: |
          set -euo pipefail
          echo "FRONTIER_SRC=${RUNNER_TEMP}/frontier" >> "$GITHUB_ENV"

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release tag must match vMAJOR.MINOR.PATCH, got: $tag" >&2
            exit 2
          fi
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ "$version" != "$tag" ]]; then
            echo "VERSION ($version) must match tag ($tag)" >&2
            exit 2
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install host tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xz-utils unzip

      - name: Checkout frontier
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$FRONTIER_VERSION" https://github.com/singchia/frontier.git "$FRONTIER_SRC"

      - name: Fetch bundled embedding model
        shell: bash
        run: |
          set -euo pipefail
          make fetch-embedding-model

      - name: Build amd64 and arm64 packages
        shell: bash
        run: |
          set -euo pipefail
          make package-all

      - name: Verify release assets
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          for arch in amd64 arm64; do
            test -s "dist/out/ongrid-${tag}-linux-${arch}.tar.xz"
            test -s "dist/out/ongrid-${tag}-linux-${arch}.tar.xz.sha256"
            (cd dist/out && sha256sum -c "ongrid-${tag}-linux-${arch}.tar.xz.sha256")
          done

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          Install (Ubuntu 22.04+/Debian 12+/RHEL/Rocky 9):

          AMD64:
          \`\`\`bash
          wget https://github.com/ongridio/ongrid/releases/download/${tag}/ongrid-${tag}-linux-amd64.tar.xz
          tar -xf ongrid-${tag}-linux-amd64.tar.xz && cd ongrid-${tag}-linux-amd64 && sudo ./install.sh
          \`\`\`

          ARM64:
          \`\`\`bash
          wget https://github.com/ongridio/ongrid/releases/download/${tag}/ongrid-${tag}-linux-arm64.tar.xz
          tar -xf ongrid-${tag}-linux-arm64.tar.xz && cd ongrid-${tag}-linux-arm64 && sudo ./install.sh
          \`\`\`
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          gh release create "$tag" \
            "dist/out/ongrid-${tag}-linux-amd64.tar.xz" \
            "dist/out/ongrid-${tag}-linux-amd64.tar.xz.sha256" \
            "dist/out/ongrid-${tag}-linux-arm64.tar.xz" \
            "dist/out/ongrid-${tag}-linux-arm64.tar.xz.sha256" \
            --verify-tag \
            --title "Ongrid ${tag}" \
            --notes-file "$RUNNER_TEMP/release-notes.md"
